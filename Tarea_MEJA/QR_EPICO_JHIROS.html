<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR ÉPICO JHIROS | Acceso Autorizado</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=Nunito:wght@800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --jhiros-orange: #FFA500;
            --jhiros-blue: #00BFFF;
            --bg-dark: #070b14;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        /* ── CONTENEDOR MAESTRO ── */
        .qr-wrapper-main {
            position: relative;
            width: 550px;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ── CÍRCULOS DE ENERGÍA (ANIME) ── */
        .magic-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 165, 0, 0.2);
            animation: ringRotate 20s linear infinite;
        }

        .ring-outer { width: 520px; height: 520px; border-style: dashed; opacity: 0.4; }
        .ring-middle { width: 480px; height: 480px; border: 4px double var(--jhiros-blue); animation-duration: 15s; animation-direction: reverse; opacity: 0.6; }
        .ring-inner { width: 440px; height: 440px; border: 1px solid var(--jhiros-orange); box-shadow: 0 0 30px rgba(255, 165, 0, 0.3); }

        @keyframes ringRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ── EL QR REAL (CONFIGURACIÓN TÉCNICA) ── */
        .qr-frame {
            position: relative;
            width: 320px;
            height: 320px;
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 0 60px rgba(255, 165, 0, 0.6);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Usamos ECC=H (High) para permitir el logo en el centro sin perder legibilidad */
        .qr-image {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* ── LOGO JHIROS (CON "QUIET ZONE" PARA SCANEO) ── */
        .logo-core {
            position: absolute;
            width: 90px;
            height: 90px;
            background: white; /* FONDO BLANCO ES VITAL PARA QUE EL QR SE LEA */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 25;
            border: 4px solid var(--jhiros-orange);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        .logo-core img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            animation: corePulse 2s ease-in-out infinite;
        }

        @keyframes corePulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--jhiros-orange)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--jhiros-orange)); }
        }

        /* ── LÁSER DE ESCANEO ── */
        .laser {
            position: absolute;
            width: 100%;
            height: 6px;
            background: var(--jhiros-blue);
            box-shadow: 0 0 20px var(--jhiros-blue), 0 0 40px var(--jhiros-blue);
            z-index: 30;
            animation: laserScan 4s ease-in-out infinite;
            pointer-events: none;
            left: 0;
        }

        @keyframes laserScan {
            0%, 100% { top: 20px; opacity: 0; }
            50% { top: 300px; opacity: 1; }
        }

        /* ── ETIQUETAS DIGITALES ── */
        .access-text {
            position: absolute;
            bottom: -90px;
            font-family: 'Space Mono', monospace;
            color: var(--jhiros-blue);
            font-size: 1.4rem;
            letter-spacing: 6px;
            text-shadow: 0 0 15px var(--jhiros-blue);
            text-transform: uppercase;
        }

        .system-status {
            position: absolute;
            top: -60px;
            color: var(--jhiros-orange);
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-family: 'Space Mono', monospace;
        }
    </style>
</head>
<body>

    <div class="qr-wrapper-main">
        <!-- Decoración Anime -->
        <div class="magic-ring ring-outer"></div>
        <div class="magic-ring ring-middle"></div>
        <div class="magic-ring ring-inner"></div>

        <div class="system-status">> SYSTEM_STABLE_V4.3_ACTIVE</div>

        <!-- QR Estructurado -->
        <div class="qr-frame">
            <div class="laser"></div>
            <!-- API con ECC=H para máxima seguridad de scaneo -->
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://luiguip11.github.io/recursos-plataforma-mat/Tarea_MEJA/propuesta_maestria.html&ecc=H&color=070b14" class="qr-image" alt="QR Escaneable">
            
            <!-- El Corazón del Código -->
            <div class="logo-core">
                <img src="https://raw.githubusercontent.com/LuiguiP11/recursos-plataforma-mat/main/images/Jhiros_New_SFBN.png" alt="Logo">
            </div>
        </div>

        <div class="access-text">Acceso Autorizado</div>
    </div>

</body>
</html>
